# Деплой на Vercel при каждом push в main.
#
# Разовая настройка — добавьте в GitHub: Settings → Secrets and variables → Actions:
#   VERCEL_TOKEN        — https://vercel.com/account/tokens
#   VERCEL_ORG_ID       — Vercel → Team Settings → Team ID (личный аккаунт: Settings → id)
#   VERCEL_PROJECT_ID   — Project → Settings → General → Project ID
#
# Альтернатива без секретов: в Vercel подключите этот репозиторий (Import Git Repository) —
# тогда Vercel сам деплоит при push; этот workflow можно удалить, чтобы не было двойных деплоев.

name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
